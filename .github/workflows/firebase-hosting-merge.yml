# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci && npm run build:hosting
      - name: Validate Firebase service account secret
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CROPINTEL_HOME }}
        run: |
          node -e "const raw = process.env.FIREBASE_SERVICE_ACCOUNT; if (!raw) throw new Error('Missing FIREBASE_SERVICE_ACCOUNT_CROPINTEL_HOME secret'); const json = JSON.parse(raw); for (const key of ['client_email', 'private_key', 'project_id']) if (!json[key]) throw new Error('Firebase service account secret is missing ' + key); if (json.project_id !== 'cropintel-home') throw new Error('Firebase service account project_id must be cropintel-home');"
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CROPINTEL_HOME }}
      - name: Deploy to Firebase Hosting
        env:
          ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
        run: |
          export GOOGLE_APPLICATION_CREDENTIALS="${{ steps.auth.outputs.credentials_file_path }}"
          node --version
          npx firebase-tools@14.17.0 deploy --only hosting --project cropintel-home --debug
